<!DOCTYPE html>
<html>
<head>
  <title>Snow White Wedding Cards</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(to bottom, #000000, #1a1a1a);
      color: white;
    }

    header {
      text-align: center;
      padding: 20px;
    }

    header img {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid white;
    }

    h1 {
      margin: 10px 0 5px;
    }

    .info {
      font-size: 14px;
      color: #ccc;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 15px;
      padding: 15px;
    }

    .card {
      background: #111;
      border-radius: 12px;
      overflow: hidden;
      transition: 0.3s;
      cursor: pointer;
    }

    .card:hover {
      transform: scale(1.05);
    }

    .card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }

    .card p {
      text-align: center;
      padding: 10px;
      font-size: 14px;
    }

    .viewer {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.9);
      display: none;
      justify-content: center;
      align-items: center;
    }

    .viewer img {
      max-width: 90%;
      max-height: 90%;
    }
  </style>
</head>

<body>

<header>
  <!-- Profile image -->
  <img src="pic.png">

  <h1>Snow White Wedding Cards</h1>
  <div class="info">Wedding Cards | Kallambalam</div>
  <div class="info">📞 +91 7012485280</div>
</header>

<div class="container">
<div class="card" onclick="openImage('IMG-20260424-WA0003.jpg')">
  <img src="IMG-20260424-WA0003.jpg">
  <p>Card 1</p>
</div>

<div class="card" onclick="openImage('IMG-20260424-WA0024.jpg')">
  <img src="IMG-20260424-WA0024.jpg">
  <p>Card 2</p>
</div>

<div class="card" onclick="openImage('IMG-20260424-WA0007.jpg')">
  <img src="IMG-20260424-WA0007.jpg">
  <p>Card 3</p>
</div>

<div class="card" onclick="openImage('IMG-20260424-WA0005.jpg')">
  <img src="IMG-20260424-WA0005.jpg">
  <p>Card 4</p>
</div>

<div class="card" onclick="openImage('IMG-20260424-WA0006.jpg')">
  <img src="IMG-20260424-WA0006.jpg">
  <p>Card 5</p>
</div>

<div class="card" onclick="openImage('IMG-20260424-WA0008.jpg')">
  <img src="IMG-20260424-WA0008.jpg">
  <p>Card 6</p>
</div>

</div>

<div class="viewer" id="viewer" onclick="closeImage()">
  <img id="viewerImg">
</div>

<script>
  function openImage(src) {
    document.getElementById("viewer").style.display = "flex";
    document.getElementById("viewerImg").src = src;
  }

  function closeImage() {
    document.getElementById("viewer").style.display = "none";
  }
</script>

</body>
</html>
